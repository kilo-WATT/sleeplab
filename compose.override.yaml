services:
  app:
    image: sleeplab-local-alpha
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_URL: http://localhost:8000
      CORS_ALLOWED_ORIGINS: "*"
      # Opt in to the in-process cpap-parser execution path (ResMedNativeLoader).
      # Default in code is off; set here for the local 2.0 import smoke test.
      SLEEPLAB_USE_CPAP_PARSER: "1"
    ports:
      - "8080:8080"
      - "8000:8000"
