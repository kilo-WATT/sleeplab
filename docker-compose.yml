services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cpap
      POSTGRES_USER: cpap
      POSTGRES_PASSWORD: cpap
    volumes:
      - sleeplab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpap -d cpap"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: joshuaaaronmyers/sleeplab:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://cpap:cpap@postgres:5432/cpap
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your environment or .env file}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      API_URL: ${API_URL:-http://localhost:8000}
      # Set to "true" to enable SleepHQ cloud import (installs sleephq-client at startup)
      SLEEPHQ_ENABLED: ${SLEEPHQ_ENABLED:-false}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      # Optional: shared secret for the POST /import/trigger/all webhook endpoint.
      # Set this if you want to trigger imports for all users from an external scheduler
      # (e.g. cron, Home Assistant, n8n). Leave empty to disable the webhook.
      IMPORT_WEBHOOK_SECRET: ${IMPORT_WEBHOOK_SECRET:-}
      # Wearable data integration
      WEARABLE_ENABLED: ${WEARABLE_ENABLED:-true}
      WEARABLE_DEFAULT_PROVIDER: ${WEARABLE_DEFAULT_PROVIDER:-}
      WEARABLE_DEFAULT_BASE_URL: ${WEARABLE_DEFAULT_BASE_URL:-}
      WEARABLE_DEFAULT_API_KEY: ${WEARABLE_DEFAULT_API_KEY:-}
    # Optional: bind-mount a host DATALOG directory into the container at /data.
    # Users can then set their server path to /data (or a subdirectory) in Settings.
    # Example — add to your .env: LOCAL_DATALOG_PATH=/mnt/nas/CPAP/DATALOG
    # volumes:
    #   - ${LOCAL_DATALOG_PATH:-}:/data:ro
      # Timezone the CPAP machine is set to.  Used by the importer to correctly
      # interpret naive local timestamps in EDF files before storing as UTC.
      # Must be a valid IANA timezone name, e.g. America/New_York, Europe/London.
      MACHINE_TZ: ${MACHINE_TZ:-UTC}
      # Timezone used to format time labels on plots and session cards in the UI.
      # Defaults to UTC; set to your local timezone for accurate display.
      DISPLAY_TZ: ${DISPLAY_TZ:-UTC}
    ports:
      - "8080:8080"
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
volumes:
  sleeplab_postgres_data:
