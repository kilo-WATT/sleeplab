[project]
name = "sleeplab"
version = "1.0.0"
description = "Sleep therapy data analysis platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.124.4",
    "uvicorn==0.33.0",
    "sqlalchemy==2.0.46",
    "psycopg2-binary==2.9.10",
    "PyJWT==2.10.1",
    "passlib==1.7.4",
    "openai==1.109.1",
    "python-multipart==0.0.27",
    "httpx>=0.27.0",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "db: tests that require a Postgres database",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
