site_name: SleepLab
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append(".")
nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Contributing: contributing.md
  - Testing: testing.md
  - Integrations:
      - CPAP Autosync: cpap-autosync-integration.md
      - SleepHQ Sync: sleephq-integration.md
  - API Reference:
      - Backend (Python): api/backend.md
      - Frontend (React): api/frontend.md
