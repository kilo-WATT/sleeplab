name: Targeted Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cpap
          POSTGRES_PASSWORD: cpap
          POSTGRES_DB: cpap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://cpap:cpap@localhost:5432/cpap_test
      SECRET_KEY: test-secret-key-for-ci-1234567890abcdef
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

          echo "$changed_files"

          frontend_changed=false
          backend_changed=false

          if echo "$changed_files" | grep -Eq '^(frontend/|package\.json|package-lock\.json|nx\.json)'; then
            frontend_changed=true
          fi

          if echo "$changed_files" | grep -Eq '^(api/|importer/|tests/|migrations/|pyproject\.toml|uv\.lock|requirements\.txt|api/requirements\.txt|nx\.json)'; then
            backend_changed=true
          fi

          echo "FRONTEND_CHANGED=$frontend_changed" >> "$GITHUB_ENV"
          echo "BACKEND_CHANGED=$backend_changed" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python 3.12
        if: env.BACKEND_CHANGED == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: env.BACKEND_CHANGED == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        if: env.BACKEND_CHANGED == 'true'
        run: uv sync --group dev

      - name: Run frontend build and tests
        if: env.FRONTEND_CHANGED == 'true'
        run: npx nx run-many --projects=frontend --targets=build,test

      - name: Run backend build and tests
        if: env.BACKEND_CHANGED == 'true'
        run: npx nx run-many --projects=api --targets=build,test

      - name: No targeted checks needed
        if: env.FRONTEND_CHANGED != 'true' && env.BACKEND_CHANGED != 'true'
        run: echo "No frontend or backend files changed."
