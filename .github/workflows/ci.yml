name: CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

          echo "$changed_files"

          backend=false
          frontend=false

          if echo "$changed_files" | grep -Eq '^(api/|importer/|tests/|migrations/|pyproject\.toml|uv\.lock|requirements\.txt|api/requirements\.txt|nx\.json|\.github/workflows/ci\.yml)'; then
            backend=true
          fi

          if echo "$changed_files" | grep -Eq '^(frontend/|package\.json|package-lock\.json|nx\.json|\.github/workflows/ci\.yml)'; then
            frontend=true
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version alignment
        run: |
          TAG_VERSION=""
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          PYPROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          NOTICE_VERSION=$(sed -n 's/^\*\*Version:\*\* \(.*\)/\1/p' NOTICE.md)

          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "package.json:  $PACKAGE_VERSION"
          echo "NOTICE.md:     $NOTICE_VERSION"
          if [[ -n "$TAG_VERSION" ]]; then
            echo "git tag:       v$TAG_VERSION"
          fi

          ERRORS=0

          if [[ "$PYPROJECT_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != package.json ($PACKAGE_VERSION)"
            ERRORS=$((ERRORS+1))
          fi

          if [[ "$PYPROJECT_VERSION" != "$NOTICE_VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != NOTICE.md ($NOTICE_VERSION)"
            ERRORS=$((ERRORS+1))
          fi

          if [[ -n "$TAG_VERSION" && "$PYPROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != git tag v$TAG_VERSION"
            ERRORS=$((ERRORS+1))
          fi

          if [[ $ERRORS -gt 0 ]]; then
            exit 1
          fi
          echo "All versions aligned!"

  backend:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cpap
          POSTGRES_PASSWORD: cpap
          POSTGRES_DB: cpap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check tests/ --output-format=github

      - name: Run backend tests
        run: uv run pytest -v --tb=short
        env:
          DATABASE_URL: postgresql+psycopg2://cpap:cpap@localhost:5432/cpap_test
          SECRET_KEY: test-secret-key-for-ci-1234567890abcdef
          OPENAI_API_KEY: ""

  frontend:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Validate workspace lockfile
        run: npm run check:workspace-lockfile

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run frontend tests
        run: npm run test:frontend
