name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: read

jobs:
  semantic-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must use Conventional Commits, for example: feat: add O2 ring import"
            echo "::error::Received: $PR_TITLE"
            exit 1
          fi
